name: Feature Request
description: Suggest a new feature for symtune
labels: ["feature", "priority: medium"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried.
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this affect?
      options:
        - CLI
        - MCP server
        - Menu bar app
        - All
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety acknowledgment
      options:
        - label: This feature does not require SMC writes or elevated privileges (or I understand the safety requirements for privileged features).
          required: true
