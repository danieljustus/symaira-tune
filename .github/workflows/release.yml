name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Swift version
        run: swift --version

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into source
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cat > Sources/SymTuneCore/Version.swift <<EOF
          import Foundation

          /// Single source of truth for the tool version. Kept in sync with the git tag
          /// on release (`v<version>`); release builds override this value from the tag.
          public enum TuneVersion: Sendable {
              public static let current = "${VERSION}"
          }
          EOF

      - name: Build CLI release binary
        run: |
          swift build -c release
          mkdir -p build
          cp .build/release/symtune build/

      - name: Verify CLI version matches tag
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ACTUAL=$(build/symtune --version | awk '{print $2}')
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "Version mismatch: expected $VERSION, got $ACTUAL"
            exit 1
          fi
          echo "CLI version verified: $ACTUAL"

      - name: Build standalone app bundle
        run: ./scripts/build-app.sh

      - name: Stamp app bundle version
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            build/app/SymairaTune.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" \
            build/app/SymairaTune.app/Contents/Info.plist
          APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' \
            build/app/SymairaTune.app/Contents/Info.plist)
          if [ "$APP_VERSION" != "$VERSION" ]; then
            echo "App version mismatch: expected $VERSION, got $APP_VERSION"
            exit 1
          fi
          mv build/app/SymairaTune.app build/SymairaTune.app
          rmdir build/app

      - name: Smoke-test unsigned release bundle
        run: ./scripts/smoke-app.sh build/SymairaTune.app

      - name: Sign app bundle
        id: signing
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "SIGNED=false" >> "$GITHUB_OUTPUT"
          if [ -z "$DEVELOPER_ID_APPLICATION" ]; then
            echo "No Developer ID certificate — producing an unsigned artifact."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          cleanup() {
            rm -f "$CERTIFICATE_PATH"
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          }
          trap cleanup EXIT

          security create-keychain -p "${KEYCHAIN_PASSWORD:-}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD:-}" "$KEYCHAIN_PATH"
          printf '%s' "$DEVELOPER_ID_APPLICATION" | base64 --decode > "$CERTIFICATE_PATH"

          if [ -n "${DEVELOPER_ID_CERTIFICATE_PASSWORD:-}" ]; then
            security import "$CERTIFICATE_PATH" \
              -k "$KEYCHAIN_PATH" \
              -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -T /usr/bin/codesign
          elif ! security import "$CERTIFICATE_PATH" \
              -k "$KEYCHAIN_PATH" \
              -P "" \
              -A -t cert -f pkcs12 -T /usr/bin/codesign; then
            echo "::warning::Developer ID certificate password is not configured; producing an unsigned artifact."
            exit 0
          fi
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD:-}" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "The certificate did not provide a Developer ID Application identity." >&2
            exit 1
          fi

          codesign --force --deep --options runtime --timestamp \
            --sign "$IDENTITY" build/SymairaTune.app
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" build/symtune
          codesign --verify --deep --strict --verbose=2 build/SymairaTune.app
          codesign --verify --strict --verbose=2 build/symtune
          echo "SIGNED=true" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          hdiutil create -volname "SymairaTune" \
            -srcfolder build \
            -ov -format UDZO \
            "symtune-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Notarize DMG
        if: steps.signing.outputs.SIGNED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_PASSWORD" ]; then
            echo "Apple notarization credentials are incomplete — skipping notarization."
            exit 0
          fi
          xcrun notarytool submit \
            "symtune-${{ steps.version.outputs.VERSION }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "build/SymairaTune.app"
          hdiutil create -volname "SymairaTune" \
            -srcfolder build \
            -ov -format UDZO \
            "symtune-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(cat <<'NOTES_EOF'
          ## Installation

          ### Direct download
          Open the DMG and drag `SymairaTune.app` to `/Applications`. The same
          volume contains the `symtune` CLI binary for manual installation into
          `/usr/local/bin/`.

          ### Homebrew
          ```bash
          brew install danieljustus/tap/symtune
          ```

          Homebrew installs the menu-bar app and links the CLI into `PATH`.
          NOTES_EOF
          )
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            symtune-${{ steps.version.outputs.VERSION }}.dmg
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: false

      - name: Publish Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "No HOMEBREW_TAP_TOKEN — skipping cask publish."
            exit 0
          fi

          DMG_SHA=$(shasum -a 256 "symtune-${{ steps.version.outputs.VERSION }}.dmg" | awk '{print $1}')
          CASK_CONTENT=$(cat <<CASK_EOF
          cask "symtune" do
            version "${{ steps.version.outputs.VERSION }}"
            sha256 "${DMG_SHA}"

            url "https://github.com/danieljustus/symaira-tune/releases/download/v#{version}/symtune-#{version}.dmg"
            name "Symaira Tune"
            desc "Native macOS menu-bar controls for thermals, brightness, and power"
            homepage "https://github.com/danieljustus/symaira-tune"

            depends_on macos: :sonoma

            app "SymairaTune.app"
            binary "symtune"

            zap trash: [
              "~/.config/symtune",
              "~/.cache/symtune",
              "~/.local/share/symtune",
            ]
          end
          CASK_EOF
          )

          TAP_DIR=$(mktemp -d)
          trap 'rm -rf "$TAP_DIR"' EXIT
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/danieljustus/homebrew-tap.git" \
            "$TAP_DIR"
          mkdir -p "$TAP_DIR/Casks"
          printf '%s\n' "$CASK_CONTENT" > "$TAP_DIR/Casks/symtune.rb"
          cd "$TAP_DIR"
          git add Casks/symtune.rb
          if ! git diff --cached --quiet; then
            git -c user.name='symaira-release[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "Update symtune to ${{ steps.version.outputs.VERSION }}"
            git push
          fi
