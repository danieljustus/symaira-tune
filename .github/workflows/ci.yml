name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: SwiftLint
        uses: realm/SwiftLint@0.57.0
        with:
          args: --strict

  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  build-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build SymairaTune app
        run: |
          xcodebuild build \
            -project SymairaTune.xcodeproj \
            -scheme SymairaTune \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
