name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict

  build-test:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v6
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  build-app:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build app target
        run: ./scripts/build-app.sh
      - name: Smoke-test app bundle
        run: ./scripts/smoke-app.sh build/app/SymairaTune.app
