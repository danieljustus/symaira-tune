name: SymairaTune
options:
  bundleIdPrefix: com.symaira
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  symaira-appkit:
    url: https://github.com/danieljustus/symaira-appkit.git
    revision: "019e506"

targets:
  SymTuneCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/SymTuneCore
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        OTHER_LDFLAGS:
          - "-framework"
          - "AppKit"
          - "-framework"
          - "IOKit"

  SymairaTune:
    type: application
    platform: macOS
    sources:
      - Sources/SymTuneApp
    dependencies:
      - target: SymTuneCore
      - package: symaira-appkit
        product: SymairaUpdateCheck
    settings:
      base:
        INFOPLIST_FILE: Sources/SymTuneApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.symaira.tune
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        OTHER_LDFLAGS:
          - "-framework"
          - "AppKit"
          - "-framework"
          - "IOKit"
