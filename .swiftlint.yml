# SwiftLint configuration for symaira-tune

excluded:
  - .build
  - DerivedData
  - docs/planned  # Planned features not yet wired into the main product

disabled_rules:
  - todo                # TODOs are intentional project-management markers
  - trailing_comma      # Style preference — trailing commas are intentional in this codebase
  - non_optional_string_data_conversion  # Current usage is correct
  - opening_brace       # Current formatting is consistent
  - for_where           # Current patterns are clear

line_length:
  warning: 200
  error: 250
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
    error: 0
  excluded: [id, i, j, k, x, y, n, v, to, on]

function_body_length:
  warning: 120
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 800
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 25
  error: 40
